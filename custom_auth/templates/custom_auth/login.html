<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="container">
        <h1>Login</h1>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p class="{{ message.tags }}" style="color: green; font-weight: bold;">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="username">Username:</label>
            <input type="text" name="username" id="username" required placeholder="Enter your username" autocomplete="username">

            <label for="password">Password:</label>
            <input type="password" name="password" id="password" required minlength="12" 
                   placeholder="Enter your password" autocomplete="current-password" 
                   pattern=".{12,}" title="Password must be at least 12 characters long">

            <label for="remember_me">
                Remember Me
                <input type="checkbox" name="remember_me">
            </label>

            <button type="submit">Sign In</button>
        </form>

        <a href="#">Forgot Password?</a><br>
        <a href="{% url 'sign_up' %}">Don't have an account? Sign Up</a><br>
        <a href="{% url 'home' %}">Home Page</a>
    </div>
</body>
</html>
